name: Tests & Coverage

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Match the Python version used in the Dockerfile
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests with coverage
        env:
          # Provide required env vars – values are only used for tests (SQLite replaces MySQL)
          MYSQL_PASSWORD: test_password
          SECRET_KEY: test-secret-key-at-least-32-chars-long!
          DEBUG: "true"
          PASSWORD_HASHER_TIME_COST: "1"
          PASSWORD_HASHER_MEMORY_COST: "8"
          PASSWORD_HASHER_PARALLELISM: "1"
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Upload coverage report (XML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
