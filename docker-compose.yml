services:
  mysql:
    image: docker.io/library/mysql:8.3
    container_name: docstore-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: docstore
      MYSQL_USER: docstore
      MYSQL_PASSWORD: your_secure_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -u root --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: docstore-app
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
      - ./requirements.txt:/requirements.txt
    environment:
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: your_secure_password
      MYSQL_PORT: 3306
      SECRET_KEY: your-super-secret-key-change-me
      DEBUG: True
      INIT_ADMIN_PASSWORD: admin123
      GUNICORN_WORKERS: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data: